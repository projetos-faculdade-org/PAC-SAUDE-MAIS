services:
  db:
    image: postgres:16-alpine
    container_name: saude-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saude123}
      POSTGRES_DB: ${POSTGRES_DB:-saudemais}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saude} -d ${POSTGRES_DB:-saudemais}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saude-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saude}:${POSTGRES_PASSWORD:-saude123}@db:5432/${POSTGRES_DB:-saudemais}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-troque-em-producao}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saude-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
